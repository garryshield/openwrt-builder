      #       IMAGE_TAG="${DEVICE_TARGET}-${DEVICE_SUBTARGET}-24.10.2"
      #     else
      #       IMAGE_TAG="${DEVICE_TARGET}-${DEVICE_SUBTARGET}-openwrt-24.10.2"
      #     fi

      #     echo "Using Docker image: ${{ matrix.platform }}/imagebuilder:$IMAGE_TAG"

      #     docker run --rm \
      #       --user root \
      #       -v ${{ github.workspace }}/files:/openwrt/files \
      #       -v ${{ github.workspace }}/bin:/openwrt/bin \
      #       ${{ matrix.platform }}/imagebuilder:$IMAGE_TAG \
      #       make image \
      #         PROFILE="${DEVICE_PROFILE}" \
      #         BIN_DIR="/openwrt/bin" \
      #         FILES="/openwrt/files"

      - name: Test
        run: |
          echo ${IMAGE_TAG} > bin/info.txt

      - name: List Build Artifacts
        run: ls -lh bin

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.platform }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.DEVICE_PROFILE }}
          path: bin/**/*
