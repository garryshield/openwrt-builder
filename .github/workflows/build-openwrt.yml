name: Build OpenWrt Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  Config:
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: |
          echo "step1"

  Docker:
    runs-on: ubuntu-latest
    needs: [Config]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare folders
        run: mkdir -p bin files

      - name: Pull Image
        run: |
          docker pull immortalwrt/imagebuilder:x86-64-openwrt-24.10.2
          docker image ls

      - name: Make Image
        run: |
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}/files:/immortalwrt/files \
            -v ${{ github.workspace }}/bin:/immortalwrt/bin \
            immortalwrt/imagebuilder:x86-64-openwrt-24.10.2 \
            make image \
            BIN_DIR="/immortalwrt/bin" \
            FILES="/immortalwrt/files"

      - name: List output
        run: |
          ls -la ${{ github.workspace }}/bin

      - name: Upload firmware as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-output
          path: bin/
          compression-level: 0

  DELRUNS:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
