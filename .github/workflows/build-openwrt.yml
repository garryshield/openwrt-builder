name: Build OpenWrt Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  Config:
    runs-on: ubuntu-latest
    steps:
      - name: step1
        run: |
          echo "step1"

  Docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Pull ImageBuilder Docker Image
        run: |
          docker pull immortalwrt/imagebuilder:x86-64-openwrt-24.10.2
          docker image ls

      - name: Build
        run: |
          docker run --rm \
            --user root
            -v ${{ github.workspace }}/files:/immortalwrt/files \
            -v ${{ github.workspace }}/bin:/immortalwrt/bin \
            immortalwrt/imagebuilder:x86-64-openwrt-24.10.2 \
            make image \
            BIN_DIR="/immortalwrt/bin" \
            FILES="/immortalwrt/files"

      - name: List output
        run: |
          ls -la ${{ github.workspace }}/bin