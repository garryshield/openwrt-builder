name: Build OpenWrt Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  Config:
    runs-on: ubuntu-latest
    steps:
      - name: sPlaceholder Step
        run: echo "Start configuration phase"

  Docker-Build:
    needs: [Config]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: immortalwrt
            target: x86/64/generic
          - platform: openwrt
            target: x86/64/generic

    env:
      DEVICE_TARGET: ${{ matrix.target && fromJson('["' + matrix.target + '"]')[0].split('/')[0] }}
      DEVICE_SUBTARGET: ${{ matrix.target && fromJson('["' + matrix.target + '"]')[0].split('/')[1] }}
      DEVICE_PROFILE: ${{ matrix.target && fromJson('["' + matrix.target + '"]')[0].split('/')[2] }}

    steps:
