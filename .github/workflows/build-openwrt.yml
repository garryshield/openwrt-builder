name: Build OpenWrt Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: immortalwrt
          #   version: 24.10.2
          #   target: x86/64/generic
          - platform: openwrt
            version: 24.10.2
            target: x86/64/generic

    steps:
      - name: Generate Build Variables
        run: |
          TARGET=$(echo "${{ matrix.target }}" | cut -d'/' -f1)
          SUBTARGET=$(echo "${{ matrix.target }}" | cut -d'/' -f2)
          PROFILE=$(echo "${{ matrix.target }}" | cut -d'/' -f3)

          echo "PLATFORM=${{ matrix.platform }}" >> $GITHUB_ENV
          echo "VERSION=${{ matrix.version }}" >> $GITHUB_ENV
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "SUBTARGET=$SUBTARGET" >> $GITHUB_ENV
          echo "PROFILE=$PROFILE" >> $GITHUB_ENV

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        env:
          TARGET: ${{ env.TARGET }}
          SUBTARGET: ${{ env.SUBTARGET }}
        with:
          name: ${{ matrix.platform }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ matrix.version }}
          path: bin/

      - name: Release
        uses: softprops/action-gh-release@v2
        env:
          TARGET: ${{ env.TARGET }}
          SUBTARGET: ${{ env.SUBTARGET }}
        with:
          tag_name: ${{ matrix.platform }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ matrix.version }}
          body_path: bin/info.md
          files: bin/*
