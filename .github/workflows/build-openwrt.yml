name: Build OpenWrt Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  Config:
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder Step
        run: echo "Start configuration phase"

  Docker-Build:
    needs: [Config]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: immortalwrt
            version: 24.10.2
            target: x86/64/generic
          - platform: openwrt
            version: 24.10.2
            target: x86/64/generic

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Generate Build Variables
        shell: bash
        run: |
          DEVICE_TARGET=$(echo "${{ matrix.target }}" | cut -d'/' -f1)
          DEVICE_SUBTARGET=$(echo "${{ matrix.target }}" | cut -d'/' -f2)
          DEVICE_PROFILE=$(echo "${{ matrix.target }}" | cut -d'/' -f3)

          echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
          echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
          echo "DEVICE_PROFILE=$DEVICE_PROFILE" >> $GITHUB_ENV

      - name: Prepare Output Directory
        run: mkdir -p bin

      # - name: Build OpenWrt Firmware via Docker
      #   env:
      #     PLATFORM: ${{ matrix.platform }}
      #     VERSION: ${{ matrix.version }}
      #     DEVICE_TARGET: ${{ env.DEVICE_TARGET }}
      #     DEVICE_SUBTARGET: ${{ env.DEVICE_SUBTARGET }}
      #     DEVICE_PROFILE: ${{ env.DEVICE_PROFILE }}
      #   run: |
      #     if [ "$PLATFORM" = "openwrt" ]; then
      #       IMAGE_TAG="${DEVICE_TARGET}-${DEVICE_SUBTARGET}-${VERSION}"
      #     else
      #       IMAGE_TAG="${DEVICE_TARGET}-${DEVICE_SUBTARGET}-openwrt-${VERSION}"
      #     fi

      #     echo "Using Docker image: ${PLATFORM}/imagebuilder:${IMAGE_TAG}"

      #     docker run --rm \
      #       --user root \
      #       -v ${{ github.workspace }}/files:/openwrt/files \
      #       -v ${{ github.workspace }}/bin:/openwrt/bin \
      #       ${PLATFORM}/imagebuilder:${IMAGE_TAG} \
      #       make image \
      #         PROFILE="${DEVICE_PROFILE}" \
      #         BIN_DIR="/openwrt/bin" \
      #         FILES="/openwrt/files"

      - name: List Build Artifacts
        run: ls -lh bin

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ matrix.version }}
          path: bin/
